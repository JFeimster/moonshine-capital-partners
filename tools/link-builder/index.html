<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Referral Link Builder | Moonshine Capital</title>
  <meta name="description" content="Generate tracked partner referral URLs for Moonshine Capital static routes.">
  <meta property="og:title" content="Moonshine Capital Link Builder">
  <meta property="og:description" content="Create share-ready attribution URLs for partner pages, tools, and funding routes.">
  <link rel="canonical" href="https://moonshine-capital-partners.vercel.app/tools/link-builder/">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/tools.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="sticky-header"><div class="container header-inner"><div class="logo-container"><div class="logo-symbol">M</div><div class="logo-text">MOONSHINE<span>CAPITAL</span></div></div></div></header>

  <main id="main-content" class="section-shell">
    <section class="container">
      <h1>Referral Link Builder</h1>
      <p>Build clean tracked links for partners, funding pages, tools, and vertical routes.</p>
      <form id="link-builder-form" class="form-shell">
        <div class="form-grid">
          <div class="form-group"><label class="form-label" for="partnerName">Partner Name</label><input class="form-input" id="partnerName" name="partnerName" value="Jane Smith"></div>
          <div class="form-group"><label class="form-label" for="partnerSlug">Partner Slug</label><input class="form-input" id="partnerSlug" name="partnerSlug" value="jane-smith"></div>
          <div class="form-group"><label class="form-label" for="referralCode">Referral Code</label><input class="form-input" id="referralCode" name="referralCode" value="JANE2026"></div>
          <div class="form-group"><label class="form-label" for="campaignSource">Campaign Source</label><input class="form-input" id="campaignSource" name="campaignSource" value="partner"></div>
          <div class="form-group"><label class="form-label" for="campaignContent">Campaign Content</label><input class="form-input" id="campaignContent" name="campaignContent" value="email-blast"></div>
          <div class="form-group"><label class="form-label" for="targetPage">Target Page</label><input class="form-input" id="targetPage" name="targetPage" value="/funding/working-capital/"></div>
        </div>
        <div class="cta-row" style="margin-top:14px;">
          <button class="btn btn-primary" type="submit">Generate URLs</button>
          <button class="btn btn-secondary" id="copy-link-builder-output" type="button">Copy</button>
        </div>
      </form>
      <pre class="output-box" id="link-builder-output">Generated links will appear here.</pre>
    </section>
  </main>

  <script src="/data/config.js"></script>
  <script src="/assets/js/tracking.js"></script>
  <script src="/assets/js/link-builder.js"></script>
</body>
</html>
